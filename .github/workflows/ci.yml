name: CI

on:
  push:
  pull_request:

jobs:
  test-and-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run reproducible baseline
        run: python baseline_inference.py --seed 1337
