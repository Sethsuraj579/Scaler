# OpenEnv Specification - GridNav Environment
# Full compliance with OpenEnv standard for reproducible AI environments

name: GridNav - Grid Navigation & Item Collection
version: "1.0.0"
description: |
  A grid-based navigation environment where AI agents navigate 2D grids
  to collect items while avoiding obstacles and hazards. The environment
  supports three difficulty levels with progressively challenging configurations.

# Environment metadata
metadata:
  author: OpenEnv Contributors
  license: MIT
  environment_type: gridworld
  task_type: navigation
  observation_type: dict
  action_type: discrete

# Observation space specification
observation_space:
  type: dict
  shape: null
  dtype: float32
  properties:
    agent_x:
      type: float
      description: Agent X position (0.0 to 1.0)
      bounds: [0.0, 1.0]
    agent_y:
      type: float
      description: Agent Y position (0.0 to 1.0)
      bounds: [0.0, 1.0]
    closest_item_x:
      type: float
      description: Closest item X position (0.0 to 1.0)
      bounds: [0.0, 1.0]
    closest_item_y:
      type: float
      description: Closest item Y position (0.0 to 1.0)
      bounds: [0.0, 1.0]
    closest_item_dist:
      type: float
      description: Distance to closest item (normalized)
      bounds: [0.0, 1.414]
    items_collected:
      type: float
      description: Proportion of items collected (0.0 to 1.0)
      bounds: [0.0, 1.0]
    steps_remaining:
      type: float
      description: Proportion of steps remaining (0.0 to 1.0)
      bounds: [0.0, 1.0]
    cumulative_reward:
      type: float
      description: Cumulative reward since reset
      bounds: [-inf, +inf]

# Action space specification
action_space:
  type: discrete
  n: 5
  actions:
    - value: 0
      name: UP
      description: Move agent up (decrease y)
    - value: 1
      name: DOWN
      description: Move agent down (increase y)
    - value: 2
      name: LEFT
      description: Move agent left (decrease x)
    - value: 3
      name: RIGHT
      description: Move agent right (increase x)
    - value: 4
      name: COLLECT
      description: Attempt to collect item at current location

# Task definitions
tasks:
  - id: easy
    name: Easy Navigation
    description: Navigate 5x5 grid, collect 3 items, no hazards
    difficulty: 1
    config:
      grid_size: 5
      num_items: 3
      num_obstacles: 1
      num_hazards: 0
      max_steps: 100
      max_restarts: 0
    reward_spec:
      collection_reward_range: [0.5, 1.5]
      movement_penalty: -0.01
      obstacle_penalty: -0.1
      hazard_penalty: -5.0
      completion_bonus: 5.0
    evaluation:
      collection_score_weight: 0.5
      efficiency_score_weight: 0.3
      safety_score_weight: 0.2
      completion_threshold: 0.8

  - id: medium
    name: Medium Navigation
    description: Navigate 10x10 grid, collect 8 items, has obstacles and hazards
    difficulty: 2
    config:
      grid_size: 10
      num_items: 8
      num_obstacles: 4
      num_hazards: 2
      max_steps: 200
      max_restarts: 0
    reward_spec:
      collection_reward_range: [0.5, 1.5]
      movement_penalty: -0.01
      obstacle_penalty: -0.1
      hazard_penalty: -5.0
      completion_bonus: 5.0
    evaluation:
      collection_score_weight: 0.5
      efficiency_score_weight: 0.3
      safety_score_weight: 0.2
      completion_threshold: 0.8

  - id: hard
    name: Hard Navigation
    description: Navigate 15x15 grid, collect 15 items, many obstacles and hazards
    difficulty: 3
    config:
      grid_size: 15
      num_items: 15
      num_obstacles: 8
      num_hazards: 3
      max_steps: 150
      max_restarts: 0
    reward_spec:
      collection_reward_range: [0.5, 1.5]
      movement_penalty: -0.01
      obstacle_penalty: -0.1
      hazard_penalty: -5.0
      completion_bonus: 5.0
    evaluation:
      collection_score_weight: 0.5
      efficiency_score_weight: 0.3
      safety_score_weight: 0.2
      completion_threshold: 0.8

# Grading specification
grading:
  enabled: true
  score_range: [0.0, 1.0]
  metrics:
    - name: collection_score
      description: Proportion of items collected
      weight: 0.5
      bounds: [0.0, 1.0]
    - name: efficiency_score
      description: Efficiency of movement relative to optimal
      weight: 0.3
      bounds: [0.0, 1.0]
    - name: safety_score
      description: Safety metric (avoiding hazards)
      weight: 0.2
      bounds: [0.0, 1.0]
  completion_bonus:
    enabled: true
    threshold: 0.8
    multiplier: 1.1
  final_clamping: [0.0, 1.0]

# API endpoints
api:
  base_url: http://localhost:7860
  endpoints:
    - path: /health
      method: GET
      description: Health check
      response: |
        {
          "status": "healthy",
          "ready": true
        }
    
    - path: /config
      method: GET
      description: Get environment configuration
      response: EnvironmentConfig
    
    - path: /reset
      method: POST
      description: Reset environment and start new episode
      request:
        task_id: Optional[str] = "easy"
        session_id: Optional[str] = null
      response: |
        {
          "session_id": str,
          "observation": dict,
          "info": dict
        }
    
    - path: /step
      method: POST
      description: Execute one step in environment
      request:
        action: int (0-4)
        session_id: Optional[str] = null
      response: |
        {
          "session_id": str,
          "observation": dict,
          "reward": float,
          "terminated": bool,
          "truncated": bool,
          "info": dict
        }
    
    - path: /state/{session_id}
      method: GET
      description: Get current state without stepping
      response: |
        {
          "session_id": str,
          "observation": dict,
          "info": dict
        }
    
    - path: /grade
      method: POST
      description: Grade episode performance (0.0-1.0)
      request:
        task_id: Optional[str] = "easy"
        cumulative_reward: float = 0.0
        items_collected: int = 0
        total_items: int = 3
        steps_taken: int = 0
        max_steps: int = 100
        hit_hazard: bool = false
      response: |
        {
          "score": float,
          "feedback": str,
          "details": dict
        }
    
    - path: /render/{session_id}
      method: GET
      description: ASCII art visualization of grid
      response: |
        {
          "session_id": str,
          "grid": str,
          "task": str,
          "step": int,
          "agent_pos": [int, int]
        }
    
    - path: /tasks
      method: GET
      description: List all available tasks
      response: |
        {
          "tasks": [TaskDefinition, ...]
        }

# Reproducibility specification
reproducibility:
  seed_required: false
  deterministic: true  # Environment is deterministic given same seed
  stochasticity:
    - type: initial_state
      description: Random agent and item placement

# Compliance verification
compliance:
  spec_version: "1.0.0"
  implements:
    - reset()
    - step()
    - state()
    - render()
    - grade()
  validated: true
  last_verified: "2026-04-12"

# Tags for discoverability
tags:
  - openenv
  - gridworld
  - navigation
  - item-collection
  - reinforcement-learning
  - multi-task
  - deterministic

# Example usage
examples:
  python: |
    import requests
    
    # Reset environment
    resp = requests.post('http://localhost:7860/reset', json={'task_id': 'easy'})
    session_id = resp.json()['session_id']
    obs = resp.json()['observation']
    
    # Step environment
    resp = requests.post('http://localhost:7860/step', 
                        json={'action': 3, 'session_id': session_id})
    obs, reward = resp.json()['observation'], resp.json()['reward']
    
    # Grade episode
    resp = requests.post('http://localhost:7860/grade',
                        json={'task_id': 'easy', 'items_collected': 3, 
                              'total_items': 3, 'steps_taken': 45})
    score = resp.json()['score']
  
  curl: |
    # Reset
    curl -X POST http://localhost:7860/reset \
      -H "Content-Type: application/json" \
      -d '{"task_id": "easy"}'
    
    # Step
    curl -X POST http://localhost:7860/step \
      -H "Content-Type: application/json" \
      -d '{"action": 3, "session_id": "session_0"}'
    
    # Grade
    curl -X POST http://localhost:7860/grade \
      -H "Content-Type: application/json" \
      -d '{"task_id": "easy", "items_collected": 3, "total_items": 3, "steps_taken": 45, "max_steps": 100}'
